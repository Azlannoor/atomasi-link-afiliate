<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lensa Si Oren | Rekomendasi Produk</title>
    <style>
        :root { --primary-color: #f39c12; --bg-color: #e0f2f1; --text-color: #2c3e50; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-color); color: var(--text-color); display: flex; flex-direction: column; align-items: center; padding: 40px 20px; margin: 0; }
        
        .profile-pic { width: 100px; height: 100px; border-radius: 50%; border: 4px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); background-color: var(--primary-color); display: flex; align-items: center; justify-content: center; font-size: 40px; margin-bottom: 15px; }
        h1 { font-size: 1.5rem; margin: 5px 0; text-align: center; color: #ee4d2d; }
        p { font-size: 0.9rem; color: #666; margin-bottom: 25px; text-align: center; }
        
        .links-container { width: 100%; max-width: 400px; }
        
        /* --- DESAIN KOLOM PENCARIAN --- */
        #searchInput {
            width: 100%; padding: 12px 15px; margin-bottom: 20px; border-radius: 25px; 
            border: 2px solid #ddd; font-size: 0.9rem; text-align: center; outline: none;
            transition: all 0.3s ease; box-sizing: border-box; background: white;
        }
        #searchInput:focus { border-color: var(--primary-color); box-shadow: 0 0 8px rgba(243, 156, 18, 0.3); }
        
        .category-title { font-size: 0.9rem; font-weight: bold; margin: 10px 0 15px 0; color: #555; text-transform: uppercase; letter-spacing: 1px; text-align: center; }

        /* --- DESAIN KARTU LINK (ANIMASI BOUNCE) --- */
        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.8) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        
        .link-card {
            background: white; display: block; text-align: center; padding: 15px; margin-bottom: 12px; border-radius: 12px; text-decoration: none; color: var(--text-color); font-weight: 600; transition: all 0.3s ease; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            animation: bounceIn 0.4s ease-out both;
        }
        .link-card:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 5px 15px rgba(0,0,0,0.1); background-color: var(--primary-color); color: white; }
        .link-card span { display: block; margin-top: 4px; }

        /* --- DESAIN PAGINATION --- */
        .pagination { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; margin-bottom: 30px; }
        .pagination button { padding: 8px 15px; border: none; background: var(--primary-color); color: white; border-radius: 20px; cursor: pointer; font-weight: bold; transition: background 0.3s;}
        .pagination button:hover { background: #d68910; }
        .pagination button:disabled { background: #ccc; cursor: not-allowed; }
        #pageInfo { font-size: 0.9rem; font-weight: bold; color: #555; }

        .footer { margin-top: 20px; font-size: 0.8rem; opacity: 0.6; text-align: center; padding-bottom: 40px; }
    </style>
</head>
<body>

    <div class="profile-pic">🐱</div>
    <h1>Lensa Si Oren</h1>
    <p>Rekomendasi Gadget & Info Viral Pilihan</p>

    <div class="links-container">
        
        <input type="text" id="searchInput" placeholder="🔍 Cari nama barang atau nomor..." onkeyup="filterLinks()">

        <div class="category-title">🔥 Racun Gadget & Viral</div>
        
        <div id="linkWrapper">
            <p style="text-align:center; font-size:0.8rem;">Memuat produk pilihan...</p>
        </div>

        <div class="pagination" id="paginationControls">
            <button onclick="changePage(-1)" id="btnPrev">⬅️ Prev</button>
            <span id="pageInfo">Hal 1 / 1</span>
            <button onclick="changePage(1)" id="btnNext">Next ➡️</button>
        </div>

        <div class="category-title">🤝 Connect</div>
        <a href="mailto:abdul@azlannoor.my.id" class="link-card">📧 Kerja Sama / Kontak</a>

    </div>
    
    <div class="footer">© 2026 Lensa Si Oren. Managed by Abdul.</div>

    <script>
        const itemsPerPage = 10; // Menampilkan 10 link per halaman
        let currentPage = 1;
        let allProducts = [];

        // Ambil data dari GitHub data.json
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                // MENGURUTKAN DATA BERDASARKAN ANGKA DI DEPAN (1, 2, 3...)
                allProducts = data.sort((a, b) => {
                    // Mengambil angka di awal kalimat, jika tidak ada angka anggap urutan ke-999999
                    let angkaA = parseInt(a.nama) || 999999;
                    let angkaB = parseInt(b.nama) || 999999;
                    return angkaA - angkaB; // Urutkan dari kecil ke besar (Ascending)
                });
                renderLinks();
            })
            .catch(err => {
                document.getElementById('linkWrapper').innerHTML = "<p style='text-align:center; color:red;'>Gagal memuat data produk.</p>";
            });

        function renderLinks() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const linkWrapper = document.getElementById('linkWrapper');
            
            // Filter Berdasarkan Pencarian
            const filteredProducts = allProducts.filter(p => {
                return p.nama.toLowerCase().includes(searchTerm);
            });

            // Hitung Halaman
            const totalPages = Math.ceil(filteredProducts.length / itemsPerPage) || 1;
            if (currentPage > totalPages) currentPage = totalPages;
            if (currentPage < 1) currentPage = 1;

            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;

            linkWrapper.innerHTML = ''; // Bersihkan list sebelumnya

            if (filteredProducts.length === 0) {
                linkWrapper.innerHTML = "<p style='text-align:center; font-size:0.8rem;'>Produk tidak ditemukan.</p>";
            } else {
                // Hanya memotong (slice) 10 data untuk halaman yang sedang aktif
                const pageItems = filteredProducts.slice(startIndex, endIndex);
                pageItems.forEach(item => {
                    const a = document.createElement('a');
                    a.href = item.link;
                    a.className = 'link-card';
                    a.target = '_blank';
                    a.innerHTML = item.nama; 
                    linkWrapper.appendChild(a);
                });
            }

            // Update Status Tombol dan Info Halaman
            document.getElementById('pageInfo').innerText = `Hal ${currentPage} / ${totalPages}`;
            document.getElementById('btnPrev').disabled = (currentPage === 1);
            document.getElementById('btnNext').disabled = (currentPage === totalPages);
        }

        function changePage(direction) {
            currentPage += direction;
            renderLinks();
            window.scrollTo({ top: 150, behavior: 'smooth' }); // Otomatis scroll ke atas list saat ganti halaman
        }

        function filterLinks() {
            currentPage = 1; // Kembali ke halaman 1 setiap kali mengetik di pencarian
            renderLinks();
        }
    </script>
</body>
</html>
